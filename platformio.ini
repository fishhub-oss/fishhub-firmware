[env:nodemcu-32s]
platform      = espressif32
board         = nodemcu-32s
framework     = arduino
monitor_speed = 115200
lib_deps =
  paulstoffregen/OneWire @ ^2.3.8
  milesburton/DallasTemperature @ ^3.11.0
  bblanchon/ArduinoJson @ ^7.3.1

[env:native]
platform = native
lib_deps =
  bblanchon/ArduinoJson @ ^7.3.1
